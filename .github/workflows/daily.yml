name: Daily GitHub Star Radar

on:
  schedule:
    # 每天 08:10 运行；避开整点，降低 GitHub Actions 排队延迟概率
    - cron: "10 8 * * *"
      timezone: "America/New_York"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: true

      - name: Sync latest branch
        run: git pull --ff-only origin "${GITHUB_REF_NAME:-main}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate daily report
        env:
          # GitHub Actions 自动提供 GITHUB_TOKEN；OPENAI_API_KEY 需要你在仓库 Secrets 里添加
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: gpt-5.5
          TZ_NAME: America/New_York
          TOP_N: "20"
          WINDOW_HOURS: "24"
          DATA_DELAY_HOURS: "2"
          OUTPUT_DIR: reports
          SKIP_FORKS: "true"
        run: python daily_github_star_radar.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit"
          else
            git commit -m "chore: daily github star radar report"
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            git push
          fi
